<svg id="snappy-logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="100%" height="100%">
        <defs>
          <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@1,900&amp;display=swap');
            .logo-text {
              font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
              font-size: 64px;
              font-weight: 900;
              font-style: italic;
              fill: #F97316; /* Tailwind orange-500 */
              letter-spacing: -0.06em;
